<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canım Annem</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@300;500&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0; padding: 0; height: 100vh;
            display: flex; justify-content: center; align-items: center;
            background: linear-gradient(to bottom, #fff8f8, #fce4ec);
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
        }

        /* Zarif Arkaplan Kalpleri */
        .bg-heart {
            position: absolute;
            color: rgba(255, 182, 193, 0.4);
            pointer-events: none;
            animation: floatUp 8s linear infinite;
        }
        @keyframes floatUp {
            0% { transform: translateY(110vh) scale(0.5); opacity: 0; }
            50% { opacity: 0.8; }
            100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            padding: 50px 30px;
            border-radius: 30px;
            box-shadow: 0 15px 45px rgba(0, 0, 0, 0.08);
            text-align: center;
            width: 85%;
            max-width: 360px;
            z-index: 10;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .main-icon {
            font-size: 80px;
            color: #ec407a;
            cursor: pointer;
            animation: softPulse 2s infinite ease-in-out;
            display: inline-block;
        }

        @keyframes softPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            color: #880e4f;
            font-size: 2.5rem;
            margin: 15px 0;
        }

        #sub-text {
            font-size: 1.1rem;
            color: #757575;
            min-height: 50px;
            margin: 20px 0;
            font-style: italic;
            transition: opacity 1s ease;
        }

        .action-btn {
            background: #ec407a;
            color: white;
            border: none;
            padding: 16px 35px;
            border-radius: 25px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(236, 64, 122, 0.3);
            transition: 0.3s;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div id="heart-box"></div>

    <div class="card">
        <div class="main-icon" onclick="toggleMusic()">❤️</div>
        <h1>Canım Annecim</h1>
        <p id="sub-text">Sana özel bir akşam yemeği melodisi hazırladım...</p>

        <!-- Akşam Yemeği Piyanosu (Dinner Piano) -->
        <audio id="dinnerPiano" loop>
            <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" type="audio/mpeg">
        </audio>

        <button class="action-btn" onclick="toggleMusic()" id="uiBtn">Müziği Başlat 🎵</button>
    </div>

    <script>
        const audio = document.getElementById('dinnerPiano');
        const btn = document.getElementById('uiBtn');
        const text = document.getElementById('sub-text');
        
        const loveNotes = [
            "Bu huzurlu piyano senin şefkatin gibi...",
            "Hayatımdaki en değerli varlığım.",
            "Her günüm senin sevginle güzelleşiyor.",
            "İyi ki varsın canım annem ❤️"
        ];
        let noteIndex = 0;
        let running = false;

        function toggleMusic() {
            if (audio.paused) {
                audio.play();
                btn.innerText = "Seni Seviyorum ❤️";
                if(!running) {
                    running = true;
                    startAnimations();
                }
            } else {
                audio.pause();
                btn.innerText = "Müziği Başlat 🎵";
            }
        }

        function startAnimations() {
            // Yazı döngüsü
            setInterval(() => {
                text.style.opacity = 0;
                setTimeout(() => {
                    noteIndex = (noteIndex + 1) % loveNotes.length;
                    text.innerText = loveNotes[noteIndex];
                    text.style.opacity = 1;
                }, 1000);
            }, 5000);

            // Arkaplan kalpleri
            setInterval(() => {
                const h = document.createElement('div');
                h.className = 'bg-heart';
                h.innerText = '🌸'; // Akşam yemeği zarafeti için çiçek sembolü
                h.style.left = Math.random() * 100 + 'vw';
                h.style.fontSize = (Math.random() * 15 + 15) + 'px';
                document.getElementById('heart-box').appendChild(h);
                setTimeout(() => h.remove(), 8000);
            }, 600);
        }
    </script>
</body>
</html>
